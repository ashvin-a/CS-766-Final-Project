name: Deploy product site (site/)

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/product-site-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-product-site
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
